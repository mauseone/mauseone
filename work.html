    <main class="gallery">
      <div class="post-bg" style="background-image: url('images/wkbg-01.jpg');"></div>
      <div class="gallery-header">
        <h1>The Ones That Stayed</h1>
        <p class="gallery-description">A selection of frames from my travels. These are the ones that stayed with me, the ones I keep coming back to.</p>
      </div>
      <div class="grid">
        <img src="images/photo-01.jpg" alt="" />
        <img src="images/photo-02.jpg" alt="" />
        <img src="images/photo-03.jpg" alt="" />
        <img src="images/photo-04.jpg" alt="" />
        <img src="images/photo-05.jpg" alt="" />
        <img src="images/photo-06.jpg" alt="" />

      </div>
    </footer>
    <div id="lightbox">
      <img id="lightbox-img" src="" alt="" />
    </div>

    <script>
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      document.querySelectorAll('.grid img').forEach(img => {
        img.addEventListener('click', () => {
          lightboxImg.src = img.src;
          lightbox.classList.add('active');
        });
      });

      lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
      });
    </script>
